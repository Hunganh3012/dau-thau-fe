<header class="header">
    <div class="header-left">
        <button class="menu-button" (click)="toggleNavbar()">
            <!-- Using a simple SVG for the menu icon to avoid dependency issues -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 12H21" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 6H21" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 18H21" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <span class="logo">TenderOS</span>
        <span class="pipeline">Pipeline</span>
    </div>
    <div class="header-right">
        <button class="import-button">Import Excel</button>
        <button class="create-button">+ Tạo gói thầu mới</button>
        <div class="user-info">
            <span class="user-avatar">N</span>
            <span class="user-name">Nguyễn Văn A</span>
        </div>
    </div>
</header>
